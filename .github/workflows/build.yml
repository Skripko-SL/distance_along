name: Build road_distance.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pyinstaller scipy numpy dbfread pyshp pyproj

      - name: Build
        run: pyinstaller --onefile --collect-data pyproj --name road_distance.exe distance_along_roads.py

      - uses: actions/upload-artifact@v4
        with:
          name: road_distance
          path: dist/road_distance.exe
